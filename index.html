<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>R.L ENERGIE — Maintenance</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    :root {
      --primary: #004080;
      --primary-light: #0066cc;
      --success: #28a745;
      --light: #f8f9fa;
      --dark: #1f2d3d;
      --bg: #f6f9fc;
      --border: #ced4da;
      --radius: 8px;
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
    body { background:var(--bg); color:var(--dark); min-height:100vh; line-height:1.45; font-size:15px; }

    header { background:var(--primary); color:white; padding:1.4rem 2rem; text-align:center; box-shadow:0 3px 10px rgba(0,0,0,0.15); }
    .logo { font-size:2.2rem; font-weight:800; letter-spacing:1px; }

    .main-content { max-width:1080px; margin:1.6rem auto; padding:0 1rem; }

    .card { background:white; border-radius:var(--radius); box-shadow:0 4px 14px rgba(0,0,0,0.07); margin-bottom:1.8rem; overflow:hidden; border:1px solid var(--border); }
    .ch { background:var(--primary); color:white; padding:0.95rem; font-size:1.3rem; font-weight:700; text-align:center; border-bottom:3px solid var(--primary-light); }
    .cb { padding:1.4rem 1.8rem; }

    label { font-weight:600; color:#1f2d3d; margin-bottom:0.45rem; display:block; font-size:0.95rem; }
    input, select, textarea { width:100%; padding:0.75rem; border:2px solid var(--border); border-radius:6px; font-size:0.95rem; margin-bottom:1rem; }
    input[readonly], textarea[readonly] { background:#f8f9fa; cursor:not-allowed; }

    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1.4rem; margin:1.4rem 0; }

    .photo-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:1rem; margin:1.2rem 0; }
    .photo-preview { position:relative; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    .photo-preview img { width:100%; height:130px; object-fit:cover; }
    .delete-btn { position:absolute; top:6px; right:6px; background:#dc3545; color:white; width:28px; height:28px; border-radius:50%; border:none; font-size:1.2rem; cursor:pointer; }

    .btn-big, .btn-quick { padding:0.9rem 1.6rem; border:none; border-radius:8px; font-size:1rem; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:8px; margin:0.7rem 0; transition:all 0.2s; }
    .btn-ok { background:var(--success); color:white; }
    .btn-ok:hover { background:#218838; transform:translateY(-1px); }
    .btn-prev { background:#6c757d; color:white; }
    .btn-quick { background:#17a2b8; color:white; font-size:0.88rem; padding:0.55rem 1rem; }

    .nav-row { display:flex; justify-content:space-between; margin-top:2.2rem; gap:1rem; }

    .checklist-grid { display:grid; grid-template-columns:3fr 1fr 1fr 1fr 1fr 1fr; gap:5px; margin:0.8rem 0; align-items:center; }
    .checklist-header { font-weight:bold; text-align:center; background:var(--primary); color:white; padding:0.45rem; border-radius:5px; font-size:0.85rem; }
    .checklist-item { padding:0.45rem; border-bottom:1px solid #eee; font-size:0.92rem; }
    .checklist-check { text-align:center; }
    input[type="checkbox"] { width:1.2rem; height:1.2rem; cursor:pointer; }

    #toast { position:fixed; bottom:1.8rem; left:50%; transform:translateX(-50%); z-index:9999; }
    .toast-msg { background:var(--success); color:white; padding:0.9rem 2rem; border-radius:50px; box-shadow:0 6px 20px rgba(0,0,0,0.25); animation:toast 2.8s forwards; }
    @keyframes toast { 0%{opacity:0;transform:translateY(20px) translateX(-50%);} 10%{opacity:1;transform:translateY(0) translateX(-50%);} 90%{opacity:1;transform:translateY(0) translateX(-50%);} 100%{opacity:0;transform:translateY(20px) translateX(-50%);} }
  </style>
</head>
<body>

<header>
  <div class="logo">R.L ENERGIE</div>
  <div>
    <button class="btn-admin" onclick="toggleAdminMode()" id="btnAdmin">Mode Admin</button>
    <button class="btn-exit-admin" onclick="exitAdminMode()" id="btnExitAdmin" style="display:none;">Quitter mode Admin</button>
  </div>
</header>

<div class="main-content">

  <div id="infoBlock" class="card block active">
    <div class="ch">INFORMATIONS SITE & TECHNICIEN</div>
    <div class="cb">
      <div id="adminControls" style="display:none;margin-bottom:1.4rem;">
        <label>Ajouter un nouveau client</label>
        <div style="display:flex;gap:10px;">
          <input type="text" id="newClient" placeholder="Ex: Client D - 300 kWc" style="flex:1;"/>
          <button class="btn-big btn-ok" style="width:auto;padding:0 1.6rem;" onclick="addNewClient()">Ajouter</button>
        </div>
      </div>

      <label>Nom du technicien (obligatoire)</label>
      <input type="text" id="technicianName" placeholder="Ex: Jean Dupont"/>

      <label>Client / Installation</label>
      <select id="clientSelect" onchange="loadClientData()">
        <option value="">Sélectionnez un client...</option>
      </select>

      <div id="clientDetails" style="display:none;margin-top:1.6rem;">
        <label>Détails de l’installation <span id="editDetailsBtn" style="display:none;color:var(--primary);cursor:pointer;" onclick="enableEditDetails()">✏️ Modifier (Admin)</span></label>
        <textarea id="installationDetails" readonly rows="3"></textarea>

        <label style="margin-top:1.2rem;">Anciennes dates de maintenance (rappel)</label>
        <div id="oldDatesDisplay" style="padding:0.9rem;border:1px solid #dee2e6;border-radius:6px;background:#f8f9fa;min-height:60px;line-height:1.6;"></div>

        <div class="grid-2" style="margin-top:1.4rem;">
          <div>
            <label>Date dernière maintenance</label>
            <input type="text" id="lastMaint" readonly/>
          </div>
          <div>
            <label>Date début intervention</label>
            <input type="text" id="startDate" readonly value=""/>
          </div>
        </div>

        <div class="grid-2">
          <div>
            <label>Irradiance solaire</label>
            <input type="text" id="irradiance" value="Forte"/>
          </div>
          <div>
            <label>Relevé compteur Production</label>
            <input type="text" id="releveProd"/>
          </div>
        </div>
        <div class="grid-2">
          <div>
            <label>Relevé compteur non-consommation</label>
            <input type="text" id="releveNonConso"/>
          </div>
          <div>
            <label>Présence du monitoring</label>
            <select id="monitoring"><option>Oui</option><option>Non</option></select>
          </div>
        </div>

        <label style="margin-top:1.2rem;">Plan de câblage</label>
        <input type="file" id="wiringPlanInput" accept="image/*" onchange="uploadPlan('wiring')"/>
        <div id="wiringPreview" style="margin-top:0.6rem;"></div>

        <label style="margin-top:1.2rem;">Plan du site</label>
        <input type="file" id="sitePlanInput" accept="image/*" onchange="uploadPlan('site')"/>
        <div id="sitePreview" style="margin-top:0.6rem;"></div>
      </div>

      <button class="btn-big btn-ok" onclick="startMaintenance()" style="margin-top:2rem;font-size:1.12rem;">
        <i class="fas fa-play"></i> COMMENCER LA MAINTENANCE
      </button>

      <button class="btn-big" style="background:#6c757d;color:white;margin-top:0.9rem;" onclick="restartApp()">
        <i class="fas fa-redo"></i> Recommencer une nouvelle maintenance
      </button>
    </div>
  </div>

  <div id="stepsContainer"></div>

  <!-- Étape 8 : tableaux remplissables + export -->
  <div id="step8" class="card block" style="display:none;">
    <div class="ch">8 — Finalisation & Checklists</div>
    <div class="cb">
      <p style="color:#555;margin-bottom:0.8rem;">Cochez les cases ci-dessous (le PDF et Excel seront remplis automatiquement)</p>

      <h3 style="margin:1.2rem 0 0.5rem; font-size:1.1rem;">Point de raccordement</h3>
      <div id="check-raccordement" class="checklist-grid"></div>

      <h3 style="margin:1.2rem 0 0.5rem; font-size:1.1rem;">PARTIE AC - Coffret protection</h3>
      <div id="check-ac" class="checklist-grid"></div>

      <h3 style="margin:1.2rem 0 0.5rem; font-size:1.1rem;">PARTIE ONDULEUR</h3>
      <div id="check-onduleur" class="checklist-grid"></div>

      <div style="margin-top:1.8rem;">
        <label>Observations globales / Conclusion</label>
        <textarea id="obsFinal" rows="3" placeholder="Conclusion générale, remarques pour le client..."></textarea>
      </div>

      <div class="nav-row" style="margin-top:2.2rem;">
        <button class="btn-big btn-prev" onclick="prevStep()">Précédent</button>
        <button class="btn-big btn-ok" onclick="generateReport()" style="background:#0055aa;color:white;font-size:1.1rem;padding:1rem 2rem;">
          <i class="fas fa-file-pdf"></i> GÉNÉRER PDF + EXCEL
        </button>
      </div>
    </div>
  </div>

</div>

<script>
  let currentStep = 0;
  let technicianName = "";
  let currentClientIndex = -1;
  let isAdminMode = false;
  const ADMIN_PASSWORD = "admin123";
  let stepPhotos = {};

  const clients = [
    { name: "Client A - 450 kWc", details: "Puissance : 450 kWc\nLocalisation : Région PACA", lastMaint: "15/03/2025", oldDates: ["15/03/2025","10/09/2024"], wiringPlan: null, sitePlan: null },
    { name: "Client B - 120 kWc", details: "Puissance : 120 kWc\nLocalisation : Île-de-France", lastMaint: "08/01/2026", oldDates: ["08/01/2026","12/06/2025"], wiringPlan: null, sitePlan: null },
    { name: "Client C - 800 kWc", details: "Puissance : 800 kWc\nLocalisation : Occitanie", lastMaint: "22/11/2025", oldDates: ["22/11/2025","15/05/2025"], wiringPlan: null, sitePlan: null }
  ];

  const stepsList = [
    "1 — Drone thermique toiture",
    "2 — Caméra thermique onduleur AC+DC",
    "3 — Ouverture coffret AC et onduleur AC+DC",
    "4 — Coffret de protection électrique local onduleur",
    "5 — Partie AC (câbles, tests, serrages)",
    "6 — Partie Onduleur (état visuel, fonctionnement, nettoyage)",
    "7 — Point de raccordement (logette, câbles, vérifications)",
    "8 — Finalisation & Checklists"
  ];

  let checklists = {
    raccordement: Array(6).fill({bon:false,acc:false,mau:false,ok:false,ras:false}),
    ac: Array(8).fill({bon:false,acc:false,mau:false,ok:false,ras:false}),
    onduleur: Array(9).fill({bon:false,acc:false,mau:false,ok:false,ras:false})
  };

  function createSteps() {
    const container = document.getElementById('stepsContainer');
    container.innerHTML = '';
    stepsList.forEach((title, i) => {
      const n = i + 1;
      container.innerHTML += `
        <div id="step${n}" class="card block" style="display:none;">
          <div class="ch">${title}</div>
          <div class="cb">
            <p style="color:#555;margin-bottom:0.9rem;">Prendre les photos nécessaires</p>
            <label>Photos</label>
            <input type="file" id="photo${n}" accept="image/*" multiple capture="environment" onchange="addPhoto(${n})" style="padding:0.7rem 0;"/>
            <div class="photo-grid" id="photos${n}"></div>

            <div style="margin:1.2rem 0;">
              <button class="btn-quick" onclick="quickFill(${n})">Tout OK / RAS</button>
            </div>

            <label style="margin-top:0.8rem;">Processus effectué ?</label>
            <input type="checkbox" id="chk${n}" onchange="toggleProcess(${n})" style="width:1.4rem;height:1.4rem;"/> <span style="font-size:1.05rem;vertical-align:middle;">Oui</span>

            <div class="observation" id="obsBlock${n}">
              <label><i class="fas fa-comment-dots"></i> Observation</label>
              <textarea id="obs${n}" placeholder="Décrivez si nécessaire..." oninput="updateObsPreview(${n})"></textarea>
              <div id="preview${n}" class="obs-preview"></div>
            </div>

            <div class="nav-row">
              <button class="btn-big btn-prev" onclick="prevStep()">Précédent</button>
              <button class="btn-big btn-ok" onclick="nextStep(${n})">Suivant</button>
            </div>
          </div>
        </div>
      `;
    });
  }

  function createChecklists() {
    const items = {
      raccordement: ["état visuel logette extérieur","état visuel logette intérieur","état des câbles","vérif paramétrage AGCP","vérif test différentiel","vérif serrages"],
      ac: ["état visuel câbles onduleur coffret AC","état visuel câble AC","Test continuité terre","Test réseau","vérif disjoncteur/fusibles/parafoudre","vérif serrages","Nettoyage coffret AC","Présence étiquettes"],
      onduleur: ["état visuel onduleur(s)","Fonctionnement onduleur(s)","Test découplage","Environnement local","vérif connectiques DC","vérif serrage AC","Nettoyage onduleur","Nettoyage ventilateur","Présence étiquettes"]
    };

    function build(id, list) {
      const div = document.getElementById(id);
      div.innerHTML = `<div class="checklist-header">Item</div><div class="checklist-header">Bon</div><div class="checklist-header">Acceptable</div><div class="checklist-header">Mauvais</div><div class="checklist-header">OK</div><div class="checklist-header">RAS</div>`;
      list.forEach((item, i) => {
        div.innerHTML += `
          <div class="checklist-item">${item}</div>
          <div class="checklist-check"><input type="checkbox" id="${id}-bon-${i}" onchange="updateCheck('${id}',${i},'bon')"></div>
          <div class="checklist-check"><input type="checkbox" id="${id}-acc-${i}" onchange="updateCheck('${id}',${i},'acc')"></div>
          <div class="checklist-check"><input type="checkbox" id="${id}-mau-${i}" onchange="updateCheck('${id}',${i},'mau')"></div>
          <div class="checklist-check"><input type="checkbox" id="${id}-ok-${i}" onchange="updateCheck('${id}',${i},'ok')"></div>
          <div class="checklist-check"><input type="checkbox" id="${id}-ras-${i}" onchange="updateCheck('${id}',${i},'ras')"></div>
        `;
      });
    }

    build('check-raccordement', items.raccordement);
    build('check-ac', items.ac);
    build('check-onduleur', items.onduleur);
  }

  function updateCheck(id, row, col) {
    const prefix = `${id}-${col}-${row}`;
    const chk = document.getElementById(prefix);
    if (chk.checked) {
      ['bon','acc','mau','ok','ras'].forEach(c => {
        if (c !== col) document.getElementById(`${id}-${c}-${row}`).checked = false;
      });
    }
  }

  function quickFill(n) {
    document.getElementById(`chk${n}`).checked = true;
    document.getElementById(`obs${n}`).value = "RAS - Aucun problème constaté";
    updateObsPreview(n);
    toast(`Étape ${n} → Tout OK / RAS`);
  }

  function renderClientList() {
    const sel = document.getElementById('clientSelect');
    sel.innerHTML = '<option value="">Sélectionnez un client...</option>';
    clients.forEach((c,i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
  }

  function loadClientData() {
    const idx = +document.getElementById('clientSelect').value;
    if (isNaN(idx)) {
      document.getElementById('clientDetails').style.display = 'none';
      return;
    }
    currentClientIndex = idx;
    const c = clients[idx];
    document.getElementById('clientDetails').style.display = 'block';

    const ta = document.getElementById('installationDetails');
    ta.value = c.details || "";
    ta.readOnly = !isAdminMode;

    document.getElementById('oldDatesDisplay').innerHTML = c.oldDates?.length
      ? c.oldDates.map(d => `<div>• ${d}</div>`).join('')
      : 'Aucune date enregistrée';

    document.getElementById('lastMaint').value = c.lastMaint || "";
    document.getElementById('startDate').value = new Date().toLocaleDateString('fr-FR');
  }

  function toggleAdminMode() {
    const pw = prompt("Mot de passe Admin :");
    if (pw === ADMIN_PASSWORD) {
      isAdminMode = true;
      document.getElementById('adminControls').style.display = 'block';
      document.getElementById('btnAdmin').style.display = 'none';
      document.getElementById('btnExitAdmin').style.display = 'inline-block';
      document.getElementById('installationDetails').readOnly = false;
      toast("Mode Admin activé");
    } else {
      toast("Mot de passe incorrect");
    }
  }

  function exitAdminMode() {
    isAdminMode = false;
    document.getElementById('adminControls').style.display = 'none';
    document.getElementById('btnAdmin').style.display = 'inline-block';
    document.getElementById('btnExitAdmin').style.display = 'none';
    document.getElementById('installationDetails').readOnly = true;
    toast("Mode Admin désactivé");
  }

  function addNewClient() {
    if (!isAdminMode) return toast("Mode Admin requis");
    const name = document.getElementById('newClient').value.trim();
    if (!name) return toast("Nom requis");
    if (clients.some(c => c.name === name)) return toast("Déjà existant");

    clients.push({ name, details: "", lastMaint: "", oldDates: [], wiringPlan: null, sitePlan: null });
    renderClientList();
    document.getElementById('newClient').value = "";
    toast("Client ajouté");
  }

  function enableEditDetails() {
    if (!isAdminMode) return;
    document.getElementById('installationDetails').readOnly = false;
  }

  function uploadPlan(type) {
    const file = document.getElementById(type + 'PlanInput').files[0];
    if (!file || currentClientIndex < 0) return;
    const reader = new FileReader();
    reader.onload = e => {
      clients[currentClientIndex][type + 'Plan'] = e.target.result;
      loadClientData();
    };
    reader.readAsDataURL(file);
  }

  function startMaintenance() {
    technicianName = document.getElementById('technicianName').value.trim();
    if (!technicianName) return toast("Nom technicien requis");
    if (!document.getElementById('clientSelect').value) return toast("Client requis");

    document.getElementById('infoBlock').style.display = 'none';
    document.getElementById('step1').style.display = 'block';
    currentStep = 1;
  }

  function nextStep(n) {
    if (document.getElementById(`step${n}`)) {
      document.getElementById(`step${n}`).style.display = 'none';
    }
    currentStep = n + 1;
    if (currentStep <= stepsList.length) {
      document.getElementById(`step${currentStep}`).style.display = 'block';
    } else {
      toast("Fin des étapes !");
    }
  }

  function prevStep() {
    if (currentStep <= 1) return;
    if (document.getElementById(`step${currentStep}`)) {
      document.getElementById(`step${currentStep}`).style.display = 'none';
    }
    currentStep--;
    if (currentStep >= 1) {
      document.getElementById(`step${currentStep}`).style.display = 'block';
    }
  }

  function restartApp() {
    if (confirm("Recommencer ?")) location.reload();
  }

  function addPhoto(n) {
    const files = document.getElementById(`photo${n}`).files;
    if (!stepPhotos[n]) stepPhotos[n] = [];
    for (let file of files) {
      const reader = new FileReader();
      reader.onload = e => {
        stepPhotos[n].push(e.target.result);
        renderPhotos(n);
      };
      reader.readAsDataURL(file);
    }
  }

  function renderPhotos(n) {
    const grid = document.getElementById(`photos${n}`);
    grid.innerHTML = '';
    if (stepPhotos[n]) {
      stepPhotos[n].forEach((src, idx) => {
        grid.innerHTML += `
          <div class="photo-preview">
            <img src="${src}">
            <button class="delete-btn" onclick="deletePhoto(${n},${idx})">×</button>
          </div>
        `;
      });
    }
  }

  function deletePhoto(n, idx) {
    stepPhotos[n].splice(idx, 1);
    renderPhotos(n);
  }

  function toggleProcess(n) {
    const chk = document.getElementById(`chk${n}`);
    if (chk.checked) {
      document.getElementById(`obs${n}`).value = "RAS - Aucun problème constaté";
      updateObsPreview(n);
    }
  }

  function updateObsPreview(n) {
    const textarea = document.getElementById(`obs${n}`);
    const preview = document.getElementById(`preview${n}`);
    if (textarea.value.trim()) {
      preview.style.display = 'block';
      preview.innerHTML = `<strong>Observation :</strong><br>${textarea.value}`;
      preview.style.background = '#e6f3ff';
      preview.style.padding = '0.9rem';
      preview.style.borderRadius = '6px';
      preview.style.border = '2px solid #0066cc';
    } else {
      preview.style.display = 'none';
    }
  }

  function toast(msg) {
    const el = document.createElement('div');
    el.className = 'toast-msg';
    el.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
    document.getElementById('toast').appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  function generateReport() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({margin: [10, 12, 10, 12]});
    const client = clients[currentClientIndex] || { name: "—" };

    // Couverture
    doc.setFillColor(240, 240, 240);
    doc.rect(0, 0, 210, 297, 'F');
    doc.setFontSize(40);
    doc.setTextColor(0);
    doc.text("R.L ENERGIE", 105, 80, {align: "center"});
    doc.setFontSize(14);
    doc.text("SPÉCIALISTE DU PHOTOVOLTAÏQUE", 105, 95, {align: "center"});
    doc.setFontSize(26);
    doc.text("RAPPORT DE MAINTENANCE", 105, 145, {align: "center"});

    doc.addPage();

    // Informations centrales
    let y = 22;
    doc.setFontSize(15);
    doc.text("Informations centrales", 20, y);
    y += 10;
    doc.setFontSize(10.5);
    doc.text(`Client : ${client.name}`, 20, y); y += 7;
    doc.text(`Technicien : ${technicianName}`, 20, y); y += 7;
    doc.text(`Date intervention : ${document.getElementById('startDate').value}`, 20, y); y += 7;
    doc.text(`Irradiance solaire : ${document.getElementById('irradiance').value}`, 20, y); y += 7;
    doc.text(`Relevé compteur Production : ${document.getElementById('releveProd').value || "—"}`, 20, y); y += 7;
    doc.text(`Relevé compteur non-consommation : ${document.getElementById('releveNonConso').value || "—"}`, 20, y); y += 7;
    doc.text(`Monitoring : ${document.getElementById('monitoring').value}`, 20, y); y += 12;

    // Tableau DC (vide)
    doc.setFontSize(12);
    doc.text("VÉRIFICATION DES MESURES ENTREES DC", 20, y);
    y += 8;
    doc.autoTable({
      startY: y,
      head: [['Entrées', 'N° CHAINE', 'Nb PV', 'Intensité Icc', 'Tension Uoc mesuré', 'Moyenne Uoc', 'Uoc Moyenne totale*Nb PV', 'Uoc mesuré']],
      body: Array(15).fill(['', '', '', '', '', '', '', '']),
      theme: 'grid',
      headStyles: { fillColor: [0, 85, 170], textColor: 255, fontStyle: 'bold' },
      styles: { fontSize: 8.8, cellPadding: 2.5, lineWidth: 0.1 },
      margin: { top: y + 4 }
    });
    y = doc.lastAutoTable.finalY + 10;

    // Tableaux checklists (avec ✓ si coché dans l'app)
    const clData = [
      { title: "Point de raccordement", id: 'check-raccordement', rows: 6 },
      { title: "PARTIE AC - Coffret protection", id: 'check-ac', rows: 8 },
      { title: "PARTIE ONDULEUR", id: 'check-onduleur', rows: 9 }
    ];

    clData.forEach(cl => {
      if (y > 240) { doc.addPage(); y = 22; }
      doc.setFontSize(12);
      doc.text(cl.title, 20, y);
      y += 7;
      const body = [];
      for (let i = 0; i < cl.rows; i++) {
        const row = ['', '', '', '', '', ''];
        ['bon','acc','mau','ok','ras'].forEach((col, j) => {
          if (document.getElementById(`${cl.id}-${col}-${i}`)?.checked) row[j+1] = '✓';
        });
        body.push(row);
      }
      doc.autoTable({
        startY: y,
        head: [['Item', 'Bon', 'Acceptable', 'Mauvais', 'OK', 'RAS']],
        body: body,
        theme: 'grid',
        headStyles: { fillColor: [0, 85, 170], textColor: 255, fontStyle: 'bold' },
        styles: { fontSize: 9, cellPadding: 2.4, lineWidth: 0.1 },
        margin: { top: y + 4 }
      });
      y = doc.lastAutoTable.finalY + 8;
    });

    // Observations
    if (y > 220) { doc.addPage(); y = 22; }
    doc.setFontSize(13);
    doc.text("Observations & Conclusion", 20, y);
    y += 10;
    doc.setFontSize(10.5);
    for (let n = 1; n <= 8; n++) {
      const obs = document.getElementById(`obs${n}`)?.value.trim() || "Aucune observation";
      doc.text(`Étape ${n} : ${obs}`, 20, y);
      y += 7;
    }

    // Signature
    doc.setFontSize(11);
    doc.text("Technicien : ___________________________   Date : ________________", 20, 280);
    doc.text("Client (signature) : ___________________________", 20, 290);

    doc.save(`Rapport_${client.name.replace(/ /g,'_') || 'Client'}_${new Date().toISOString().slice(0,10)}.pdf`);
    toast("Rapport PDF pro généré");
  }

  window.onload = function() {
    renderClientList();
    createSteps();
    createChecklists();
  };
</script>
</body>
</html>
