<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R.L ENERGIE — Maintenance</title>

  <!-- Style principal -->
  <link rel="stylesheet" href="style.css">

  <!-- Librairies externes -->
  <link rel="stylesheet" href="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css)">
  <script src="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js)"></script>
  <script src="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js)"></script>
  <script src="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js)"></script>
</head>

<body>

  <!-- HEADER LOGO -->
  <header class="header">
    <div class="logo-container"></div>
  </header>


  <!-- CONTENU PRINCIPAL -->
  <div class="main-content">

    <!-- ==========================
         BLOC INFORMATIONS
         ========================== -->
    <div id="infoBlock" class="card block">
      <div class="section-title">INFORMATIONS SITE & TECHNICIEN</div>
      <div class="card-body">

        <!-- Admin -->
        <div id="adminControls" class="admin-panel">
          <label>Ajouter un nouveau client</label>
          <div class="flex-row">
            <input type="text" id="newClient" placeholder="Nom client">
            <button class="btn btn-green" onclick="addNewClient()">Ajouter</button>
          </div>
        </div>

        <label>Nom du technicien (obligatoire)</label>
        <input type="text" id="technicianName" placeholder="Ex : Jean Dupont">

        <label>Client / Installation</label>
        <select id="clientSelect" onchange="loadClientData()">
          <option value="">Sélectionnez un client...</option>
        </select>

        <div id="clientDetails" class="client-details" style="display:none;">
          <label>Détails de l'installation</label>
          <textarea id="installationDetails" rows="3" readonly></textarea>

          <label>Anciennes dates de maintenance</label>
          <textarea id="oldDatesInput" rows="3"></textarea>

          <div class="grid-2">
            <div>
              <label>Date dernière maintenance</label>
              <input type="text" id="lastMaint">
            </div>
            <div>
              <label>Date début intervention</label>
              <input type="text" id="startDate" readonly>
            </div>
          </div>
        </div>

        <!-- Boutons -->
        <div class="btn-row">
          <button class="btn btn-green big" onclick="startMaintenance()">
            <i class="fas fa-play"></i> COMMENCER
          </button>

          <button class="btn btn-gray big" onclick="location.reload()">
            <i class="fas fa-redo"></i> Recommencer
          </button>

          <button class="btn btn-red big" onclick="clearAll()">
            <i class="fas fa-trash-alt"></i> Effacer tout
          </button>

          <button id="btnAdmin" class="btn btn-darkblue big" onclick="toggleAdminMode()">
            Mode Admin
          </button>
        </div>

      </div>
    </div>


    <!-- ==========================
         ÉTAPES DYNAMIQUES
         ========================== -->
    <div id="stepsContainer"></div>


    <!-- ==========================
         HISTORIQUE
         ========================== -->
    <div class="card">
      <div class="section-title">Historique des rapports enregistrés</div>
      <div class="card-body">
        <input type="text" id="searchHistory" placeholder="Rechercher..." oninput="filterHistory()">
        <div id="historyList" class="history-list"></div>
      </div>
    </div>


    <!-- ==========================
         EXPORTS
         ========================== -->
    <div class="export-row">
      <button class="btn btn-green big" onclick="generatePDF()">
        <i class="fas fa-file-pdf"></i> PDF
      </button>

      <button class="btn btn-blue big" onclick="generateExcel()">
        <i class="fas fa-file-excel"></i> Excel
      </button>

      <button class="btn btn-darkblue big" onclick="generateWord()">
        <i class="fas fa-file-word"></i> Word
      </button>

      <button class="btn btn-gray big" onclick="recommencerTout()">
        <i class="fas fa-redo"></i> Nouvelle maintenance
      </button>
    </div>


    <!-- ==========================
         BACKUP JSON
         ========================== -->
    <div class="export-row">
      <button class="btn btn-gray" onclick="exportJSON()">
        <i class="fas fa-download"></i> Export JSON
      </button>

      <button class="btn btn-gray" onclick="document.getElementById('importFile').click()">
        <i class="fas fa-upload"></i> Import JSON
      </button>

      <input type="file" id="importFile" accept=".json" hidden onchange="importJSON(event)">
    </div>

  </div>


  <!-- Notifications -->
  <div id="toast"></div>


  <!-- SCRIPT PRINCIPAL -->
  <script src="app.js"></script>

</body>
</html>
