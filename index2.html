<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>R.L ENERGIE — Maintenance Étapes</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    :root{
      --primary:#00aaff;--primary-dark:#0088cc;--success:#00d46a;--danger:#ff3b5c;
      --pdf-red:#e63946;--excel-green:#1e7e34;
      --bg-light:linear-gradient(135deg,#f8fbff,#e8f4ff);
      --card-light:#ffffff;--radius-lg:24px;--shadow-md:0 16px 48px rgba(0,0,0,0.12);
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
    body{background:var(--bg-light);color:#2d3436;min-height:100vh;padding:22px 12px;}
    header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:32px 20px;text-align:center;border-radius:var(--radius-lg);box-shadow:var(--shadow-md);margin-bottom:32px;position:relative;}
    .logo-top{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;padding:8px 16px;border-radius:14px;font-weight:900;font-size:1.1rem;}
    h1{font-size:2.6rem;font-weight:900;margin:0;}
    .card{background:var(--card-light);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);margin:20px auto;overflow:hidden;}
    .ch{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:20px 26px;font-weight:800;font-size:1.3rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
    .ch h2{margin:0;}
    .ch select{
      max-width:140px;padding:8px 12px;border-radius:12px;border:2px solid rgba(255,255,255,0.6);
      font-size:0.95rem;background:rgba(255,255,255,0.9);color:#000; /* Texte noir, fond clair */
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }
    .cb{padding:28px;}
    .block{display:none;min-height:85vh;} /* Gros blocs plein écran */
    .block.active{display:block;}
    .btn-big{padding:18px 24px;border:none;border-radius:16px;font-size:1.25rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;box-shadow:0 8px 24px rgba(0,0,0,0.15);transition:all .3s;width:100%;margin:16px 0;}
    .btn-ok{background:var(--success);color:#000;}
    .btn-prev{background:#555;color:#fff;font-size:1.1rem;padding:14px 20px;width:auto;}
    .btn-pdf{background:var(--pdf-red);color:#fff;}
    .btn-excel{background:var(--excel-green);color:#fff;}
    .fab{position:fixed;bottom:32px;right:32px;display:flex;flex-direction:column;gap:16px;z-index:9999;}
    .fab button{border-radius:50%;width:72px;height:72px;border:none;font-size:1.9rem;box-shadow:var(--shadow-md);color:#fff;}
    .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-top:16px;}
    .photo-preview{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:14px;border:3px solid #f0f0f0;}
    .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:24px;}
    #toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:10001;}
    .toast-msg{background:var(--success);color:#000;padding:16px 32px;border-radius:50px;margin:8px;box-shadow:var(--shadow-md);animation:toast 3s forwards;}
    @keyframes toast{0%{opacity:0;transform:translateY(40px)} 10%{opacity:1;transform:translateY(0)} 90%{opacity:1} 100%{opacity:0}}
  </style>
</head>
<body>

  <div id="toast"></div>

  <header>
    <div class="logo-top">&lt; R.L ENERGIE &gt;</div>
    <h1>Maintenance Étapes</h1>
  </header>

  <!-- Bloc Infos client & dates -->
  <div id="infoBlock" class="card block active">
    <div class="ch">Informations client & dates</div>
    <div class="cb">
      <label>Client / Installation</label>
      <select id="clientSelect" style="padding:16px;border-radius:16px;border:2px solid #e6eef8;width:100%;font-size:1.1rem;">
        <option value="">Choisir...</option>
        <option value="Client A - 450 kWc">Client A - 450 kWc</option>
        <option value="Client B - 120 kWc">Client B - 120 kWc</option>
        <option value="Client C - 800 kWc">Client C - 800 kWc</option>
      </select>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:24px 0;">
        <div><label>Date dernière maintenance</label><input type="text" id="lastMaint" readonly style="padding:16px;border-radius:16px;border:2px solid #e6eef8;width:100%;"></div>
        <div><label>Date début intervention</label><input type="text" id="startDate" readonly style="padding:16px;border-radius:16px;border:2px solid #e6eef8;width:100%;"></div>
      </div>

      <label>Date prochaine maintenance</label>
      <input type="text" id="nextMaint" readonly style="padding:16px;border-radius:16px;border:2px solid #e6eef8;width:100%;background:#f0f8ff;">

      <button class="btn-big btn-ok" onclick="startMaintenance()">
        <i class="fas fa-play"></i> Commencer la maintenance
      </button>
    </div>
  </div>

  <!-- Étape 1 -->
  <div id="step1" class="card block">
    <div class="ch">
      Étape 1 — Drone
      <select id="stepSelector1" onchange="goToStep(this.value)">
        <!-- Rempli en JS -->
      </select>
    </div>
    <div class="cb">
      <label>Photos drone</label>
      <input type="file" id="photo1" accept="image/*" onchange="addPhoto(1)" multiple style="padding:12px;">
      <div class="photo-grid" id="photos1"></div>
      <div class="annotation">
        <label>Annotation / Anomalie <span style="color:red">*</span></label>
        <textarea id="note1" placeholder="Décrivez ici..."></textarea>
      </div>
      <div class="nav-row">
        <button onclick="prevStep()" class="btn-big btn-prev">
          <i class="fas fa-arrow-left"></i> Précédent
        </button>
        <button class="btn-big btn-ok" onclick="nextStep(1)">
          <i class="fas fa-arrow-right"></i> Suivant
        </button>
      </div>
    </div>
  </div>

  <!-- Étape 2 -->
  <div id="step2" class="card block">
    <div class="ch">
      Étape 2 — Relevé thermique
      <select id="stepSelector2" onchange="goToStep(this.value)">
        <!-- Rempli en JS -->
      </select>
    </div>
    <div class="cb">
      <label>Photos thermique</label>
      <input type="file" id="photo2" accept="image/*" onchange="addPhoto(2)" multiple style="padding:12px;">
      <div class="photo-grid" id="photos2"></div>
      <div class="annotation">
        <label>Annotation / Anomalie <span style="color:red">*</span></label>
        <textarea id="note2" placeholder="Décrivez ici..."></textarea>
      </div>
      <div class="nav-row">
        <button onclick="prevStep()" class="btn-big btn-prev">
          <i class="fas fa-arrow-left"></i> Précédent
        </button>
        <button class="btn-big btn-ok" onclick="nextStep(2)">
          <i class="fas fa-arrow-right"></i> Suivant
        </button>
      </div>
    </div>
  </div>

  <!-- Étape 3 -->
  <div id="step3" class="card block">
    <div class="ch">
      Étape 3 — Coffret AC + Triphasé
      <select id="stepSelector3" onchange="goToStep(this.value)">
        <!-- Rempli en JS -->
      </select>
    </div>
    <div class="cb">
      <label>Photos coffret</label>
      <input type="file" id="photo3" accept="image/*" onchange="addPhoto(3)" multiple style="padding:12px;">
      <div class="photo-grid" id="photos3"></div>
      <div class="annotation">
        <label>Annotation / Anomalie <span style="color:red">*</span></label>
        <textarea id="note3" placeholder="Décrivez ici..."></textarea>
      </div>
      <div class="nav-row">
        <button onclick="prevStep()" class="btn-big btn-prev">
          <i class="fas fa-arrow-left"></i> Précédent
        </button>
        <button class="btn-big btn-ok" onclick="nextStep(3)">
          <i class="fas fa-arrow-right"></i> Suivant
        </button>
      </div>
    </div>
  </div>

  <!-- Étape 4 -->
  <div id="step4" class="card block">
    <div class="ch">
      Étape 4 — Finalisation
      <select id="stepSelector4" onchange="goToStep(this.value)">
        <!-- Rempli en JS -->
      </select>
    </div>
    <div class="cb">
      <label>Photos finale</label>
      <input type="file" id="photo4" accept="image/*" capture="environment" onchange="addPhoto(4)" multiple style="padding:12px;">
      <button class="btn-big btn-ok" style="background:#00aaff;color:#fff;margin-top:12px;" onclick="document.getElementById('photo4').click()">
        <i class="fas fa-camera"></i> Prendre photo avec la tablette
      </button>
      <div class="photo-grid" id="photos4"></div>

      <div class="annotation">
        <label>Observations finales <span style="color:red">*</span></label>
        <textarea id="note4" placeholder="Conclusion globale..."></textarea>
      </div>

      <div class="nav-row">
        <button onclick="prevStep()" class="btn-big btn-prev">
          <i class="fas fa-arrow-left"></i> Précédent
        </button>
        <button class="btn-big btn-ok" onclick="generateReport()">
          <i class="fas fa-file-pdf"></i> Terminer & Générer rapport
        </button>
      </div>

      <button class="btn-big btn-excel" onclick="generateExcel()">
        <i class="fas fa-file-excel"></i> Exporter Excel modifiable
      </button>
      <button class="btn-big" style="background:#555;color:#fff;" onclick="restartApp()">
        <i class="fas fa-redo"></i> Recommencer une nouvelle maintenance
      </button>
    </div>
  </div>

  <div class="fab">
    <button class="pdf" onclick="generateReport()"><i class="fas fa-file-pdf"></i></button>
    <button class="excel" onclick="generateExcel()"><i class="fas fa-file-excel"></i></button>
  </div>

  <script>
    let currentStep = 0;
    let allPhotos = [];
    let stepData = {};

    // Dates auto
    const today = new Date();
    document.getElementById('startDate').value = today.toLocaleDateString('fr-FR');

    document.getElementById('clientSelect').addEventListener('change', function() {
      const dates = {
        "Client A - 450 kWc": "15 mars 2025",
        "Client B - 120 kWc": "8 janvier 2026",
        "Client C - 800 kWc": "22 novembre 2025"
      };
      const last = dates[this.value] || today.toLocaleDateString('fr-FR');
      document.getElementById('lastMaint').value = last;

      const next = new Date(last.split(' ').reverse().join('-'));
      next.setFullYear(next.getFullYear() + 1);
      document.getElementById('nextMaint').value = next.toLocaleDateString('fr-FR');
    });

    function startMaintenance() {
      if (!document.getElementById('clientSelect').value) return toast("Choisis un client");
      document.getElementById('infoBlock').classList.remove('active');
      document.getElementById('step1').classList.add('active');
      currentStep = 1;
      updateStepSelectors();
    }

    function updateStepSelectors() {
      for (let i = 1; i <= 4; i++) {
        const sel = document.getElementById('stepSelector' + i);
        if (!sel) continue;
        sel.innerHTML = '';
        for (let j = 1; j <= 4; j++) {
          const opt = document.createElement('option');
          opt.value = j;
          opt.text = `Étape ${j}`;
          if (j === currentStep) opt.selected = true;
          sel.appendChild(opt);
        }
      }
    }

    function goToStep(n) {
      n = parseInt(n);
      if (n > currentStep) return toast("Termine l'étape actuelle avant de sauter");
      document.querySelectorAll('.block').forEach(b => b.classList.remove('active'));
      document.getElementById('step'+n).classList.add('active');
      currentStep = n;
      updateStepSelectors();
      if (stepData[n]) document.getElementById('note'+n).value = stepData[n];
    }

    function nextStep(from) {
      if (!document.getElementById('note'+from).value.trim()) return toast("Ajoute une annotation");
      stepData[from] = document.getElementById('note'+from).value;
      document.getElementById('step'+from).classList.remove('active');
      document.getElementById('step'+(from+1)).classList.add('active');
      currentStep = from + 1;
      updateStepSelectors();
    }

    function prevStep() {
      if (currentStep <= 1) return toast("Retour impossible");
      stepData[currentStep] = document.getElementById('note'+currentStep).value;
      document.getElementById('step'+currentStep).classList.remove('active');
      document.getElementById('step'+(currentStep-1)).classList.add('active');
      currentStep--;
      updateStepSelectors();
      if (stepData[currentStep]) document.getElementById('note'+currentStep).value = stepData[currentStep];
    }

    function addPhoto(step) {
      const input = document.getElementById('photo'+step);
      if (!input.files.length) return;
      Array.from(input.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
          const base64 = e.target.result;
          allPhotos.push({step: step, data: base64});
          renderPhotos(step);
        };
        reader.readAsDataURL(file);
      });
    }

    function renderPhotos(step) {
      const grid = document.getElementById('photos'+step);
      grid.innerHTML = '';
      allPhotos.filter(p => p.step === step).forEach(p => {
        const img = document.createElement('img');
        img.src = p.data;
        img.className = 'photo-preview';
        grid.appendChild(img);
      });
    }

    function toast(msg) {
      const t = document.createElement('div');
      t.className = 'toast-msg';
      t.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
      document.getElementById('toast').appendChild(t);
      setTimeout(() => t.remove(), 2800);
    }

    function generateReport() {
      const client = document.getElementById('clientSelect').value || 'Inconnu';
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      let y = 20;

      doc.setFillColor(0, 170, 255);
      doc.rect(0, 0, 210, 40, 'F');
      doc.setFontSize(18);
      doc.setTextColor(255);
      doc.text("RAPPORT DE MAINTENANCE", 105, 20, {align: "center"});
      doc.setFontSize(11);
      doc.text("R.L ENERGIE", 105, 30, {align: "center"});

      y = 50;
      doc.setTextColor(0);
      doc.setFontSize(12);
      doc.text(`Client / Installation : ${client}`, 20, y); y += 10;
      doc.text(`Date début intervention : ${document.getElementById('startDate').value}`, 20, y); y += 8;
      doc.text(`Dernière maintenance : ${document.getElementById('lastMaint').value}`, 20, y); y += 8;
      doc.text(`Prochaine maintenance : ${document.getElementById('nextMaint').value}`, 20, y); y += 15;

      for (let i = 1; i <= 4; i++) {
        const note = document.getElementById('note'+i).value || "RAS";
        doc.setFontSize(13);
        doc.text(`Étape ${i}`, 20, y); y += 8;
        doc.setFontSize(11);
        const lines = doc.splitTextToSize(note, 170);
        doc.text(lines, 25, y);
        y += lines.length * 7 + 5;
      }

      if (allPhotos.length > 0) {
        if (y > 220) { doc.addPage(); y = 20; }
        doc.setFontSize(14);
        doc.text("Photos jointes", 20, y); y += 12;

        allPhotos.forEach((photo, index) => {
          if (y > 240) { doc.addPage(); y = 20; }
          doc.setFontSize(11);
          doc.text(`Étape ${photo.step} - Photo ${index+1}`, 20, y); y += 8;
          doc.addImage(photo.data, 'JPEG', 20, y, 90, 50);
          y += 55;
        });
      }

      doc.setFontSize(10);
      doc.setTextColor(100);
      doc.text(`Généré le ${new Date().toLocaleString('fr-FR')} par R.L ENERGIE`, 105, 290, {align: "center"});

      doc.save(`Maintenance_${client}_${new Date().toISOString().slice(0,10)}.pdf`);
      toast("Rapport professionnel généré !");
      showRestartButton();
    }

    function generateExcel() {
      const client = document.getElementById('clientSelect').value || 'Inconnu';
      const rows = [
        ["RAPPORT MAINTENANCE - R.L ENERGIE"],
        ["Client", client],
        ["Date début", document.getElementById('startDate').value],
        ["Dernière maintenance", document.getElementById('lastMaint').value],
        ["Prochaine maintenance", document.getElementById('nextMaint').value],
        [],
        ["Étape", "Annotation"]
      ];
      for (let i = 1; i <= 4; i++) {
        rows.push([`Étape ${i}`, document.getElementById('note'+i).value || "RAS"]);
      }
      const ws = XLSX.utils.aoa_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Rapport");
      XLSX.writeFile(wb, `Maintenance_${client}_${new Date().toISOString().slice(0,10)}.xlsx`);
      toast("Excel modifiable généré !");
    }

    function restartApp() {
      location.reload();
    }

    function showRestartButton() {
      const btn = document.createElement('button');
      btn.className = 'btn-big';
      btn.style.background = '#555'; btn.style.color = '#fff';
      btn.innerHTML = '<i class="fas fa-redo"></i> Recommencer une nouvelle maintenance';
      btn.onclick = restartApp;
      document.getElementById('step4').querySelector('.cb').appendChild(btn);
    }

    function toast(msg) {
      const t = document.createElement('div');
      t.className = 'toast-msg';
      t.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
      document.getElementById('toast').appendChild(t);
      setTimeout(() => t.remove(), 2800);
    }
  </script>
</body>
</html>
